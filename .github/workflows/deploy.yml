name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
        env:
          VITE_FOOTBALL_API_KEY: ${{ secrets.VITE_FOOTBALL_API_KEY }}
          VITE_WEATHER_API_KEY:  ${{ secrets.VITE_WEATHER_API_KEY }}

      - name: Create Pages project (skips if already exists)
        run: npx wrangler pages project create cup-radar --production-branch master 2>/dev/null || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: fcbb431902c1d0379b7b42e15e886c00

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: fcbb431902c1d0379b7b42e15e886c00
          command: pages deploy dist --project-name cup-radar --branch master
