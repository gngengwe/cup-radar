name: Refresh Data

on:
  workflow_dispatch:
    inputs:
      vertical:
        description: 'Which data to refresh'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - scores
          - news
          - upsets
          - bracket
          - narratives

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run refresh
        run: node scripts/refresh/index.js
        env:
          VERTICAL: ${{ inputs.vertical }}
          FOOTBALL_API_KEY: ${{ secrets.VITE_FOOTBALL_API_KEY }}

      - name: Commit updated data
        run: |
          git config user.name "Cup Radar Bot"
          git config user.email "bot@cup-radar.pages.dev"
          git add src/data/
          git diff --staged --quiet && echo "No data changes" || \
            git commit -m "data: auto-refresh ${{ inputs.vertical }} [bot]"
          git push

      - name: Trigger deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml --ref master
